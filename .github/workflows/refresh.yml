name: Refresh Dashboard

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        id: run_pipeline
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python src/main.py
        continue-on-error: true

      - name: Create issue on failure
        if: steps.run_pipeline.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let errorDetail = 'Voir les logs du workflow pour le détail.';
            try {
              const errFile = 'data/last_error.json';
              if (fs.existsSync(errFile)) {
                const err = JSON.parse(fs.readFileSync(errFile, 'utf8'));
                errorDetail = `**Erreur** : ${err.error}\n**Timestamp** : ${err.timestamp}`;
              }
            } catch(e) {}

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Dashboard] Échec du refresh – ${new Date().toISOString().slice(0,10)}`,
              body: `## Refresh automatique échoué\n\n${errorDetail}\n\n**Workflow run** : ${runUrl}\n\n### Actions possibles\n- Régénérer le token Meta dans Business Manager\n- Mettre à jour le secret \`META_ACCESS_TOKEN\` : \`gh secret set META_ACCESS_TOKEN\`\n- Vérifier les permissions du token (\`ads_read\`, \`pages_read_engagement\`)`,
              labels: ['bug', 'automated'],
            });

      - name: Commit and push if changed
        if: steps.run_pipeline.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json docs/index.html
          git diff --staged --quiet || git commit -m "chore: refresh dashboard data [$(date -u +%Y-%m-%d)]"
          git push
